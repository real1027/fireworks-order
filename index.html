<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>煙火訂購系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; background: #f0f2f5; color: #1a1a1a; }

/* ===== VIEWS ===== */
.view { display: none; }
.view.active { display: block; }

/* ===== HOME ===== */
.home-inner {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: url('bg.jpg') center top / cover no-repeat;
  color: white;
  padding: 40px 20px;
  text-align: center;
  position: relative;
}
.home-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(10,6,30,0.25) 0%,
    rgba(10,6,30,0.10) 40%,
    rgba(10,6,30,0.55) 100%
  );
  pointer-events: none;
}
.home-inner > * { position: relative; }
.home-logo { font-size: 56px; margin-bottom: 12px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); }
.home-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 6px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 30px rgba(100,80,200,0.5);
}
.home-subtitle {
  font-size: 13px;
  opacity: 0.9;
  margin-bottom: 56px;
  letter-spacing: 2px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
}
.home-btn {
  width: 100%;
  max-width: 300px;
  padding: 18px 24px;
  border: none;
  border-radius: 16px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 14px;
  letter-spacing: 2px;
  font-family: inherit;
  transition: transform 0.1s, opacity 0.1s;
}
.home-btn:active { transform: scale(0.97); }
.btn-order {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a1a;
  box-shadow: 0 6px 24px rgba(247,151,30,0.4);
}
.btn-admin {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

/* ===== PAGE HEADER ===== */
.page-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #e8e8e8;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.back-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #555;
  width: 32px;
  display: flex;
  align-items: center;
}
.page-title { font-size: 17px; font-weight: 700; flex: 1; }
.header-action {
  background: none;
  border: none;
  font-size: 13px;
  color: #888;
  cursor: pointer;
  font-family: inherit;
  padding: 4px 8px;
}

/* ===== CUSTOMER: NAME SECTION ===== */
.name-section { background: white; padding: 16px 20px; margin-bottom: 10px; }
.field-label {
  display: block;
  font-size: 12px;
  color: #999;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.name-input {
  width: 100%;
  border: 2px solid #e8e8e8;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.name-input:focus { border-color: #302b63; }

/* ===== CUSTOMER: PRODUCT LIST ===== */
.category-section { background: white; margin-bottom: 10px; }
.category-header {
  padding: 12px 20px;
  background: #fafafa;
  font-weight: 700;
  font-size: 13px;
  color: #555;
  letter-spacing: 1px;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.product-item {
  display: flex;
  align-items: center;
  padding: 13px 20px;
  border-bottom: 1px solid #f5f5f5;
  gap: 12px;
}
.product-item:last-of-type { border-bottom: none; }
.product-checkbox {
  width: 20px;
  height: 20px;
  accent-color: #302b63;
  cursor: pointer;
  flex-shrink: 0;
}
.product-info { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.product-name { font-size: 14px; line-height: 1.4; cursor: pointer; display: block; }
.effect-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.effect-btn {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.effect-btn-img  { background: #e8f0fe; color: #1a56cc; }
.effect-btn-vid  { background: #fce4ec; color: #b71c6d; }
.product-badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-available { background: #e8f5e9; color: #2e7d32; }
.badge-limited { background: #fff3e0; color: #e65100; }
.badge-unavailable { background: #f5f5f5; color: #bbb; }

/* Quantity row (shown when checked) */
.qty-row {
  display: none;
  align-items: center;
  padding: 0 20px 12px 52px;
  gap: 10px;
}
.qty-row.visible { display: flex; }
.qty-btn {
  width: 34px;
  height: 34px;
  border: 2px solid #302b63;
  border-radius: 8px;
  background: none;
  font-size: 20px;
  font-weight: 700;
  color: #302b63;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.qty-btn:active { background: #f0eeff; }
.qty-input {
  width: 56px;
  text-align: center;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 6px 4px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
}
.qty-input:focus { border-color: #302b63; }
.qty-label { font-size: 13px; color: #888; }

/* ===== CART BAR ===== */
.cart-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #1a1040;
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 200;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
}
.cart-bar.hidden { transform: translateY(100%); }
.cart-info { font-size: 12px; opacity: 0.6; }
.cart-count { font-size: 20px; font-weight: 700; }
.preview-btn {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #1a1a1a;
  border: none;
  border-radius: 12px;
  padding: 12px 22px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.has-cart-bar { padding-bottom: 85px; }

/* ===== ORDER PREVIEW ===== */
.order-preview-content { padding: 16px; padding-bottom: 100px; }
.order-form {
  background: white;
  border-radius: 12px;
  padding: 22px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.order-title {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 6px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 2px solid #222;
}
.order-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid #e0e0e0;
}
.order-meta-item { display: flex; gap: 6px; align-items: baseline; font-size: 14px; }
.order-meta-label { font-size: 12px; color: #999; }
.order-meta-value { font-weight: 700; }
.order-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.order-table th {
  background: #f5f5f5;
  padding: 8px 4px;
  text-align: center;
  border: 1px solid #bbb;
  font-size: 12px;
  font-weight: 700;
}
.order-table td {
  padding: 7px 4px;
  border: 1px solid #ddd;
  text-align: center;
  height: 30px;
}
.order-table td.name-cell { text-align: left; padding-left: 8px; }
.order-table tr.filled td { background: #fffef0; }
.order-hint {
  text-align: center;
  color: #bbb;
  font-size: 12px;
  margin-top: 14px;
}

.action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 14px 20px;
  display: flex;
  gap: 12px;
  border-top: 1px solid #eee;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.action-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.btn-back-edit { background: #f0f0f0; color: #555; }
.btn-save-img { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; font-weight: 700; }
.btn-print { background: linear-gradient(135deg, #302b63, #0f0c29); color: white; }

/* 上傳按鈕列 */
.upload-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.upload-current { font-size: 12px; color: #888; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upload-current.has-file { color: #2e7d32; font-weight: 600; }
.upload-btn {
  font-size: 12px; padding: 6px 12px; border-radius: 8px;
  border: 1.5px solid #302b63; background: white; color: #302b63;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.upload-btn:disabled { opacity: 0.5; }
.upload-clear { background: none; border: none; color: #bbb; font-size: 16px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.upload-clear:hover { color: #f44336; }

/* 媒體檢視器 overlay */
#media-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.92);
  flex-direction: column;
  align-items: center;
}
#media-overlay-topbar {
  position: relative;
  z-index: 10001;
  width: 100%;
  max-width: 680px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  box-sizing: border-box;
  flex-shrink: 0;
}
#media-overlay-title {
  color: #fff; font-size: 15px; font-weight: 700;
}
#media-overlay-close {
  background: #e53935; color: #fff;
  border: none; border-radius: 8px;
  padding: 8px 18px; font-size: 15px; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
#media-overlay-body {
  flex: 1;
  width: 100%;
  max-width: 680px;
  overflow-y: auto;
  padding: 0 14px 20px;
  box-sizing: border-box;
}
#media-overlay-img { width: 100%; border-radius: 8px; display: block; }
#media-overlay-iframe {
  width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px;
  background: #000;
}

/* 圖片預覽 overlay */
#img-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  padding: 16px;
  box-sizing: border-box;
}
#img-overlay-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 600px;
  padding-bottom: 24px;
}
#img-overlay-hint {
  color: #fff;
  font-size: 14px;
  text-align: center;
  margin: 8px 0 0;
  line-height: 1.7;
}
#img-overlay-img {
  width: 100%;
  border-radius: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  display: block;
}
#img-overlay-close {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  padding: 10px 28px;
  font-size: 15px;
  cursor: pointer;
  margin-top: 4px;
}

/* ===== ADMIN LOGIN ===== */
.admin-login-inner {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
  color: white;
  padding: 40px 20px;
  text-align: center;
  position: relative;
}
.login-back {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  font-size: 20px;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-icon { font-size: 48px; margin-bottom: 16px; }
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.login-subtitle { font-size: 13px; opacity: 0.5; margin-bottom: 40px; }
.pin-dots { display: flex; gap: 18px; margin-bottom: 36px; }
.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: all 0.15s;
}
.pin-dot.filled { background: white; transform: scale(1.15); }
.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  max-width: 256px;
  width: 100%;
}
.pin-key {
  aspect-ratio: 1;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  color: white;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.1s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pin-key:active { background: rgba(255,255,255,0.25); transform: scale(0.93); }
.pin-key-sm { font-size: 14px; opacity: 0.8; }
.pin-error { color: #ff6b6b; font-size: 13px; margin-top: 20px; min-height: 20px; }

/* ===== ADMIN DASHBOARD ===== */
.admin-toolbar {
  background: white;
  padding: 14px 20px;
  margin-bottom: 10px;
  border-bottom: 1px solid #eee;
}
.add-product-btn {
  width: 100%;
  background: #302b63;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.admin-product-item {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  gap: 10px;
  border-bottom: 1px solid #f5f5f5;
}
.admin-toggle {
  width: 20px;
  height: 20px;
  cursor: pointer;
  accent-color: #302b63;
  flex-shrink: 0;
}
.admin-product-name { flex: 1; font-size: 13px; line-height: 1.4; }
.status-btn {
  border: none;
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.s-available { background: #e8f5e9; color: #2e7d32; }
.s-limited { background: #fff3e0; color: #e65100; }
.s-unavailable { background: #fce4ec; color: #c62828; }
.edit-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 15px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}
.edit-btn:active { color: #302b63; }
.delete-btn {
  background: none;
  border: none;
  color: #ddd;
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}
.delete-btn:active { color: #f44336; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: white;
  border-radius: 24px 24px 0 0;
  padding: 24px 24px 44px;
  width: 100%;
  max-width: 480px;
}
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 12px;
  color: #999;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.form-input, .form-select {
  width: 100%;
  border: 2px solid #e8e8e8;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  background: white;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: #302b63; }
.modal-actions { display: flex; gap: 10px; margin-top: 24px; }
.modal-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.modal-cancel { background: #f0f0f0; color: #666; }
.modal-confirm { background: #302b63; color: white; }

/* ===== ADMIN TOOLBAR BUTTONS ===== */
.admin-toolbar { display: flex; flex-direction: column; gap: 10px; }
.admin-btn-row { display: flex; gap: 10px; }
.admin-btn-secondary {
  flex: 1;
  background: white;
  color: #302b63;
  border: 2px solid #302b63;
  border-radius: 10px;
  padding: 11px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
}
.admin-btn-secondary:active { background: #f0eeff; }

/* ===== ADMIN PRINT VIEW ===== */
#admin-print-area { display: none; }
.admin-print-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 4px;
}
.admin-print-date { text-align: center; font-size: 12px; color: #888; margin-bottom: 16px; }
.admin-print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.admin-print-table th {
  background: #f0f0f0;
  border: 1px solid #999;
  padding: 6px 8px;
  text-align: left;
}
.admin-print-table td {
  border: 1px solid #ccc;
  padding: 5px 8px;
}
.admin-print-cat {
  background: #302b63;
  color: white;
  font-weight: 700;
  padding: 6px 8px;
  font-size: 12px;
}

/* ===== PRINT ===== */
@media print {
  body * { visibility: hidden !important; }

  /* Order print mode (default) */
  body:not(.print-admin) #print-area,
  body:not(.print-admin) #print-area * { visibility: visible !important; }
  body:not(.print-admin) #print-area {
    position: fixed !important;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 10mm 12mm;
    background: white;
  }
  body:not(.print-admin) .order-form { box-shadow: none !important; border-radius: 0 !important; padding: 0 !important; }
  body:not(.print-admin) .order-hint { display: none !important; }

  /* Admin product list print mode */
  body.print-admin #admin-print-area,
  body.print-admin #admin-print-area * { visibility: visible !important; }
  body.print-admin #admin-print-area {
    display: block !important;
    position: fixed !important;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 10mm 12mm;
    background: white;
  }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<!-- ======== HOME ======== -->
<div id="home" class="view active">
  <div class="home-inner">
    <div class="home-logo">🎆</div>
    <h1 class="home-title">煙火訂購系統</h1>
    <p class="home-subtitle">快速下訂 · 輕鬆管理</p>
    <button class="home-btn btn-order" onclick="startOrder()">🛒 &nbsp;我要下訂</button>
    <button class="home-btn btn-admin" onclick="goAdminLogin()">⚙️ &nbsp;管理介面</button>
  </div>
</div>

<!-- ======== CUSTOMER VIEW ======== -->
<div id="customer" class="view">
  <div class="page-header">
    <button class="back-btn" onclick="showView('home')">←</button>
    <span class="page-title">選擇品項</span>
  </div>
  <div id="customer-content" class="has-cart-bar">
    <div id="product-list"></div>
  </div>
  <div class="cart-bar hidden" id="cart-bar">
    <div>
      <div class="cart-info">已選品項</div>
      <div class="cart-count"><span id="cart-item-count">0</span> 項</div>
    </div>
    <button class="preview-btn" onclick="previewOrder()">確認訂單 →</button>
  </div>
</div>

<!-- ======== ORDER PREVIEW ======== -->
<div id="order-preview" class="view">
  <div class="page-header">
    <button class="back-btn" onclick="showView('customer')">←</button>
    <span class="page-title">確認訂單</span>
  </div>

async function save() {
  localStorage.setItem(KEY_PRODUCTS, JSON.stringify(products));
  if (USE_SHEETS) {
    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ key: WRITE_KEY, products })
      });
    } catch(e) { console.warn('Sheets save error', e); }
  }
}
let remotePin = null; // 從 Google Sheets 讀到的密碼
function getPin() { return remotePin || localStorage.getItem(KEY_PIN) || DEFAULT_PIN; }
function findProduct(id) { return products.find(p => p.id === id); }

/* 啟動順序：Google Sheets → localStorage → 預設 */
// 先用快取或預設品項，讓 UI 立即可用
products = JSON.parse(localStorage.getItem(KEY_PRODUCTS)) || DEFAULT_PRODUCTS;

// 背景載入 Sheets，完成後更新品項（若購物車還空才刷新列表）
const initPromise = (async function init() {
  if (!USE_SHEETS) return;
  try {
    const res = await fetch(SHEETS_URL);
    if (!res.ok) return;
    const data = await res.json();
    if (data.adminPin) remotePin = String(data.adminPin);
    if (data.products && data.products.length > 0) {
      products = data.products;
      localStorage.setItem(KEY_PRODUCTS, JSON.stringify(products));
      // 若顧客頁面開著且購物車是空的，靜默刷新品項列表
      if (document.getElementById('customer')?.classList.contains('active') && Object.keys(cart).length === 0) {
        renderProductList();
        updateCartBar();
      }
    }

  '大型煙火(直上)':'🚀', '中型煙火類':'🎇', '小型煙火類':'✨',

function renderProductList() {
  const cats = {};
  products.filter(p => p.on).forEach(p => {
    (cats[p.cat] = cats[p.cat] || []).push(p);
  });

  let html = '';
  for (const [cat, items] of Object.entries(cats)) {
    const emoji = CAT_EMOJI[cat] || '🎆';
    html += `<div class="category-section">
      <div class="category-header"><span>${emoji}</span>${cat}</div>`;
    items.forEach(p => {
      const avail = p.status === '現貨' || p.status === '少量';
      const bdg = p.status === '少量' ? 'badge-limited' : avail ? 'badge-available' : 'badge-unavailable';
      const effectBtns = [
        p.effectImg   ? `<button class="effect-btn effect-btn-img" onclick="showMedia('${p.effectImg}','img','${p.name} 效果單')">📋 效果單</button>` : '',
        p.effectVideo ? `<button class="effect-btn effect-btn-vid" onclick="showMedia('${p.effectVideo}','video','${p.name} 影片')">🎬 影片</button>` : ''
      ].filter(Boolean).join('');
      html += `
        <div class="product-item">
          <input type="checkbox" class="product-checkbox" id="cb-${p.id}"
            ${avail ? '' : 'disabled'} onchange="toggleCart('${p.id}')">
          <div class="product-info">
            <label for="cb-${p.id}" class="product-name" style="${avail ? '' : 'color:#ccc'}">${p.name}</label>
            ${effectBtns ? `<div class="effect-btns">${effectBtns}</div>` : ''}
          </div>
          <span class="product-badge ${bdg}">${p.status}</span>
        </div>
        <div class="qty-row" id="qty-${p.id}">
          <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
          <input class="qty-input" type="number" id="qi-${p.id}" value="1" min="1" max="9999"
            oninput="setQty('${p.id}',this.value)">
          <button class="qty-btn" onclick="changeQty('${p.id}',1)">＋</button>
          <span class="qty-label">箱</span>
        </div>`;
    });
    html += '</div>';
  }
  if (!html) html = '<div style="text-align:center;padding:40px;color:#bbb">目前沒有可訂購的品項</div>';
  document.getElementById('product-list').innerHTML = html;
}

function toggleCart(id) {
  const cb = document.getElementById('cb-' + id);
  const qr = document.getElementById('qty-' + id);
  if (cb.checked) {
    cart[id] = 1;
    document.getElementById('qi-' + id).value = 1;
    qr.classList.add('visible');
  } else {
    delete cart[id];
    qr.classList.remove('visible');
  }
  updateCartBar();
}

function changeQty(id, d) {
  const el = document.getElementById('qi-' + id);
  const v = Math.max(1, (parseInt(el.value) || 1) + d);
  el.value = v;
  cart[id] = v;
}

function setQty(id, v) {
  cart[id] = Math.max(1, parseInt(v) || 1);
}

function updateCartBar() {
  const count = Object.keys(cart).length;
  document.getElementById('cart-item-count').textContent = count;
  document.getElementById('cart-bar').classList.toggle('hidden', count === 0);
}

  for (let i = 0; i < 4; i++)

function cycleStatus(id) {

  const c = ['現貨','少量','缺'];

  renderAdmin();

==================================================== */
function triggerUpload(type) {
  document.getElementById('file-' + type).click();
}

async function handleUpload(event, type) {
  const file = event.target.files[0];
  if (!file) return;

  const maxBytes = type === 'effectVideo' ? 50 * 1024 * 1024 : 10 * 1024 * 1024;
  if (file.size > maxBytes) {
    alert(`檔案過大！${type === 'effectVideo' ? '影片限 50MB' : '圖片限 10MB'} 以內`);
    event.target.value = '';
    return;
  }

  const btn = document.getElementById('edit-' + type + '-btn');
  const label = document.getElementById('edit-' + type + '-label');
  btn.disabled = true;
  btn.textContent = '⏳ 上傳中...';
  label.textContent = '上傳中，請稍候...';
  label.className = 'upload-current';

  try {
    // 轉 base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await fetch(SHEETS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ key: WRITE_KEY, action: 'uploadFile', fileName: file.name, mimeType: file.type, data: base64 })
    });
    const result = await res.json();
    if (!result.success) throw new Error(result.error || '上傳失敗');

    document.getElementById('edit-' + type + '-url').value = result.url;
    label.textContent = '✓ ' + file.name;
    label.className = 'upload-current has-file';
    document.getElementById('edit-' + type + '-clear').style.display = 'inline';
  } catch(e) {
    alert('上傳失敗：' + e.message);
    label.textContent = '上傳失敗';
    label.className = 'upload-current';
  } finally {
    btn.disabled = false;
    btn.textContent = type === 'effectVideo' ? '📎 選擇影片' : '📎 選擇圖片';
    event.target.value = '';
  }
}

function clearUpload(type) {
  document.getElementById('edit-' + type + '-url').value = '';
  document.getElementById('edit-' + type + '-label').textContent = '未上傳';
  document.getElementById('edit-' + type + '-label').className = 'upload-current';
  document.getElementById('edit-' + type + '-clear').style.display = 'none';
}

function setUploadState(type, url) {
  const label = document.getElementById('edit-' + type + '-label');
  const clear = document.getElementById('edit-' + type + '-clear');
  document.getElementById('edit-' + type + '-url').value = url || '';
  if (url) {
    label.textContent = '✓ 已有檔案';
    label.className = 'upload-current has-file';
    clear.style.display = 'inline';
  } else {
    label.textContent = '未上傳';
    label.className = 'upload-current';
    clear.style.display = 'none';
  }
}

function showMedia(url, type, title) {
  let overlay = document.getElementById('media-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'media-overlay';
    overlay.innerHTML = `
      <div id="media-overlay-topbar">
        <span id="media-overlay-title"></span>

      </div>

// ── 分類下拉輔助函式 ──────────────────────────────────────
function buildCatSelect(selectId, currentCat) {
  const cats = [...new Set(products.map(p => p.cat))];
  const sel = document.getElementById(selectId);
  sel.innerHTML = cats.map(c =>
    `<option value="${c}"${c === currentCat ? ' selected' : ''}>${c}</option>`
  ).join('') + `<option value="__new__">＋ 新增分類...</option>`;
  if (currentCat && !cats.includes(currentCat)) sel.value = '__new__';
}

function onCatSelectChange(prefix) {
  const isNew = document.getElementById(prefix + '-cat-select').value === '__new__';
  const custom = document.getElementById(prefix + '-cat-custom');
  custom.style.display = isNew ? 'block' : 'none';
  if (isNew) setTimeout(() => custom.focus(), 50);
}

function getCatValue(prefix) {
  const sel = document.getElementById(prefix + '-cat-select');
  if (sel.value === '__new__') return document.getElementById(prefix + '-cat-custom').value.trim();
  return sel.value;
}

  overlay.addEventListener('click', e => { if (e.target === overlay) closeAllModals(); });
});
</script>
